<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah Siswa - SIMAS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">S</div>
      <div>
        <div class="brand-name">SIMAS</div>
        <div class="brand-sub">Sistem Informasi Manajemen Siswa</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Menu Utama</div>
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon"><i class="fas fa-th-large"></i></span> Dashboard
      </a>
      <a href="siswa.html" class="nav-item">
        <span class="nav-icon"><i class="fas fa-users"></i></span> Data Siswa
      </a>
      <a href="form_siswa.html" class="nav-item active">
        <span class="nav-icon"><i class="fas fa-user-plus"></i></span> Tambah Siswa
      </a>
      <a href="detail_siswa.html" class="nav-item">
        <span class="nav-icon"><i class="fas fa-id-card"></i></span> Detail Siswa
      </a>
      <a href="rapor.html" class="nav-item">
        <span class="nav-icon"><i class="fas fa-print"></i></span> Cetak Rapor
      </a>
    </nav>
    <div class="sidebar-footer"><strong>SIMAS &copy; 2026</strong><br><small>Made by Fudhail.</small></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-title">Tambah Siswa Baru</div>
      <div class="topbar-actions">
        <a href="siswa.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Kembali</a>
      </div>
    </div>
    <div class="content">
      <div class="card" style="max-width:720px">
        <form>
          <div class="foto-upload-area">
            <div class="avatar lg">
              <span>?</span>
            </div>
            <div>
              <label class="btn btn-outline" for="foto" style="cursor:pointer"><i class="fas fa-camera"></i> Pilih Foto</label>
              <input type="file" id="foto" accept="image/*" style="display:none">
              <div style="font-size:12px;color:var(--gray-400);margin-top:6px">JPG, PNG, GIF &middot; Maks 2MB</div>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label>NISN <span class="required">*</span></label>
              <input class="input" type="text" required placeholder="0012345678">
            </div>
            <div class="form-group">
              <label>Jenis Kelamin <span class="required">*</span></label>
              <select class="input" required>
                <option value="L">Laki-laki</option>
                <option value="P">Perempuan</option>
              </select>
            </div>
            <div class="form-group full">
              <label>Nama Lengkap <span class="required">*</span></label>
              <input class="input" type="text" required placeholder="Masukkan nama lengkap">
            </div>
            <div class="form-group">
              <label>Kelas <span class="required">*</span></label>
              <select class="input" required>
                <option>X</option>
                <option>XI-IPA</option>
                <option>XI-IPS</option>
                <option>XII-IPA</option>
                <option>XII-IPS</option>
              </select>
            </div>
            <div class="form-group">
              <label>Tempat Lahir</label>
              <input class="input" type="text" placeholder="Bekasi">
            </div>
            <div class="form-group">
              <label>Tanggal Lahir</label>
              <input class="input" type="date">
            </div>
            <div class="form-group">
              <label>No. Telepon</label>
              <input class="input" type="text" placeholder="081234567890">
            </div>
            <div class="form-group full">
              <label>Alamat</label>
              <textarea class="input" rows="2" placeholder="Jl. Melati No. 12, Cikarang"></textarea>
            </div>
          </div>

          <div class="form-actions">
            <a href="siswa.html" class="btn btn-outline"><i class="fas fa-times"></i> Batal</a>
            <button class="btn btn-primary" type="button"><i class="fas fa-save"></i> Simpan Data</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
